# Sized for ~$347 account (see config/settings.yaml risk.starting_balance_usdt).
# Sum of target_usdc is aspirational — disable rows or lower targets if cash cannot fund all sleeves.
moonshot:
  enabled_live_orders: true
  poll_seconds: 60
  quote_asset: USDT
  # Bot-owned lots: orders use newClientOrderId prefix; startup rebuilds managed_qty/avg from tagged trades only.
  client_order_id_prefix: msbot
  reconcile_on_startup: true
  reconcile_lookback_days: 90
  reconcile_max_fetch_iterations: 40
  # If true, startup always overwrites state from tagged trades (ignore file when tags exist).
  reconcile_strict_tagged_only: false
  # Sells USDC/FDUSD/… for USDT on spot; Binance funding-wallet balances are included and moved to spot before the sell.
  auto_convert_to_quote: true
  conversion_source_assets:
    - USDC
    - FDUSD
    - TUSD
    - BUSD
  min_conversion_notional: 5
  stablecoin_buffer_quote: 0
  min_order_notional: 5
  rebalance_tolerance_pct: 5
  take_profit_pct: 100
  take_profit_sell_fraction: 0.30
  stop_loss_pct: 18
  state_file: moonshot_state.json

  # Allow moonshot runner when settings.execution.mode is paper (dry orders still follow enabled_live_orders).
  runner:
    allow_when_settings_execution_not_live: false

  # Periodic scan → merge into this YAML → rebalance loop uses updated symbols.
  scanner_automation:
    enabled: true
    interval_seconds: 1800
    engine: multi_source
    write_portfolio_yaml: true
    backup_yaml: true
    rules:
      top_n: 8
      min_24h_quote_volume: 800000
      max_candidates_after_binance: 30
      min_dex_liquidity_usd: 0

  scanner_sync:
    mode: append
    default_target_usdc: 10
    # Lock to manual assets below (no new scanner-appended rows).
    max_append: 0

  assets:
    # Core: BTC + USDC sleeve + alts. Enabled rows total ~$220 of ~$347 account baseline.
    - name: Bitcoin
      symbol: BTC/USDT
      target_usdc: 60
      enabled: true
      manual_only: false

    - name: USDC
      symbol: USDC/USDT
      target_usdc: 15
      enabled: true
      manual_only: false

    - name: Render
      symbol: RENDER/USDT
      target_usdc: 25
      enabled: true
      manual_only: false

    - name: AIOZ Network
      symbol: AIOZ/USDT
