moonshot:
  enabled_live_orders: true
  poll_seconds: 60
  quote_asset: USDT
  # Bot-owned lots: orders use newClientOrderId prefix; startup rebuilds managed_qty/avg from tagged trades only.
  client_order_id_prefix: msbot
  reconcile_on_startup: true
  reconcile_lookback_days: 90
  reconcile_max_fetch_iterations: 40
  # If true, startup always overwrites state from tagged trades (ignore file when tags exist).
  reconcile_strict_tagged_only: false
  auto_convert_to_quote: true
  conversion_source_assets:
    - USDC
    - FDUSD
    - TUSD
    - BUSD
  min_conversion_notional: 5
  stablecoin_buffer_quote: 0
  min_order_notional: 5
  rebalance_tolerance_pct: 5
  take_profit_pct: 100
  take_profit_sell_fraction: 0.30
  stop_loss_pct: 18
  state_file: moonshot_state.json

  # Allow moonshot runner when settings.execution.mode is paper (dry orders still follow enabled_live_orders).
  runner:
    allow_when_settings_execution_not_live: false

  # Periodic scan → merge into this YAML → rebalance loop uses updated symbols.
  scanner_automation:
    enabled: true
    interval_seconds: 1800
    engine: multi_source
    write_portfolio_yaml: true
    backup_yaml: true
    rules:
      top_n: 8
      min_24h_quote_volume: 800000
      max_candidates_after_binance: 30
      min_dex_liquidity_usd: 0

  scanner_sync:
    mode: append
    default_target_usdc: 10
    max_append: 8

  assets:
    - name: Render
      symbol: RENDER/USDT
      target_usdc: 20
      enabled: true
      manual_only: false

    - name: AIOZ Network
      symbol: AIOZ/USDT
      target_usdc: 15
      enabled: false
      manual_only: false

    - name: Phala Network
      symbol: PHA/USDT
      target_usdc: 10
      enabled: true
      manual_only: false

    - name: ZetaChain
      symbol: ZETA/USDT
      target_usdc: 10
      enabled: false
      manual_only: false

    - name: Celer Network
      symbol: CELR/USDT
      target_usdc: 10
      enabled: true
      manual_only: false

    - name: Highstreet
      symbol: HIGH/USDT
      target_usdc: 10
      enabled: true
      manual_only: false

    - name: Verasity
      symbol: VRA/USDT
      target_usdc: 10
      enabled: false
      manual_only: false

    - name: DIMO
      symbol: DIMO/USDT
      target_usdc: 10
      enabled: false
      manual_only: false

    - name: NFPrompt
      symbol: NFP/USDT
      target_usdc: 5
      enabled: true
      manual_only: false

    - name: Synapse
      symbol: SYN/USDT
      target_usdc: 10
      enabled: true
      manual_only: false
