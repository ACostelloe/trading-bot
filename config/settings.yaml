exchange:
  name: swyftx
  # Swyftx demo uses api.demo.swyftx.com.au
  sandbox: false

market:
  # Trend bot: separate from moonshot. BTC is targeted in moonshot_portfolio.yaml only (avoids double BTC exposure).
  symbols:
    - ETH/AUD
  timeframe: 15m
  limit: 300
  poll_seconds: 30

strategy:
  ema_fast: 20
  ema_slow: 50
  rsi_period: 14
  rsi_entry_min: 55
  atr_period: 14
  stop_atr_multiple: 1.5
  take_profit_rr: 2.0

risk:
  # Baseline for drawdown / daily-loss / checklist math in quote currency (AUD).
  starting_balance_usdt: 347
  # moonshot checklist equity: binance_total = full spot book (recommended); moonshot_symbols_only = narrower
  equity_valuation: binance_total
  account_risk_per_trade: 0.001
  account_risk_per_trade_low: 0.001
  account_risk_per_trade_medium: 0.001
  account_risk_per_trade_high: 0.001
  max_daily_loss: 0.02
  max_open_positions_total: 2
  max_open_positions_per_symbol: 1
  min_order_notional: 20

state:
  file: state.json

# Single portfolio ledger: exchange vs bot-tracked slices (trend / moonshot).
ledger:
  file: unified_ledger.json
  reconcile_on_startup: true
  reconcile_lookback_days: 90
  reconcile_max_fetch_iterations: 40
  # If true, tagged trade replay overwrites saved slices whenever history has a position.
  strict_reconcile_tagged_only: false
  trend_client_order_prefix: trbot

logging:
  file: bot.log
  # Optional JSONL stream (set path to enable), e.g. bot.events.jsonl
  structured_events_file: null

alerts:
  telegram_enabled: false

backtest:
  fee_rate: 0.001
  slippage_rate: 0.0005

walk_forward:
  train_bars: 180
  test_bars: 60
  step_bars: 60

parameter_selection:
  enabled: true
  # Tracked file so deploys (e.g. Lightsail) have a valid overlay; override locally to approved_strategy_params.yaml after walk-forward.
  source_file: config/approved_strategy_defaults.yaml
  require_stability_threshold: false
  min_stability_score: 0.45
  min_combo_win_pct: 25.0

execution:
  mode: live   # paper | live
  require_explicit_live_flag: true
  live_min_notional_check: true
  # 0 = no daily cap
  max_live_trades_per_day: 0
  allow_multiple_positions: false
  stablecoin_cash_buffer_usdt: 0
  # Used when market symbols are */USDC (USDT buffer alone is not required).
  stablecoin_cash_buffer_usdc: 0
  max_consecutive_api_errors: 5
  # Temporary plumbing test helper: none | buy | sell
  manual_signal_override: none
  # When manual_signal_override=buy, target this USDT notional (keep ≤ starting_balance_usdt).
  manual_buy_usdt: 250

moonshot_checklist:
  # When true, live/run_moonshot.py calls evaluate_moonshot_entry before each buy.
  enabled: true
  # Count of checks.* set to true required to allow entry. Use 0 until you flip checks from research.
  min_score_to_allow: 0
  # Hard caps from your checklist (per buy notional). Must be >= largest moonshot target_usdc (e.g. BTC 60).
  max_position_usdc: 70
  max_microcap_position_usdc: 7
  max_presale_position_usdc: 5
  # Raise when portfolio lists many symbols; checklist counts open moonshot positions with tracked qty.
  max_open_moonshots: 20
  max_total_drawdown_pause_pct: 25
  # Optional symbol classifiers for stricter caps.
  microcap_symbols: []
  presale_symbols: []
  # Set booleans from your research process before trading.
  checks:
    narrative_tailwind: false
    social_confirmation: false
    narrative_not_euphoric: false
    healthy_24h_volume: false
    acceptable_spread: false
    enough_orderbook_depth: false
    acceptable_slippage_quote: false
    contract_verified: false
    holder_distribution_ok: false
    unlock_schedule_known: false
    wallet_behavior_not_suspicious: false
    written_trade_plan_ready: false
  # Any true flag below blocks entries immediately.
  red_flags:
    dangerous_mutable_contract: false
    removable_liquidity_or_rug_pattern: false
    oversized_unlocked_team_wallets: false
    no_clear_exit_path: false
    fomo_only_no_plan: false
